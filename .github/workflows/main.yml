name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend CI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Dependencies
        run: |
          cd apps/backend
          go mod download

      - name: Build
        run: |
          cd apps/backend
          go build -v ./cmd/server/main.go

      - name: Test
        run: |
          cd apps/backend
          go test -v ./...

  frontend:
    name: Frontend CI (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Build
        run: |
          cd apps/frontend
          npm run build

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t betting-backend:latest apps/backend/

      - name: Build Frontend Image
        run: docker build -t betting-frontend:latest apps/frontend/