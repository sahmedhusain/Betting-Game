<svg width="240" height="336" viewBox="0 0 240 336" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- White Glass Base -->
    <linearGradient id="base_gradient" x1="120" y1="0" x2="120" y2="336" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    
    <!-- Subtle Glossy Overlay -->
    <linearGradient id="gloss_overlay" x1="0" y1="0" x2="240" y2="336" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0.05"/>
    </linearGradient>
    
    <!-- Shadow for depth -->
    <filter id="tile_depth" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Main Tile Body -->
  <rect x="4" y="4" width="232" height="328" rx="28" fill="url(#base_gradient)" filter="url(#tile_depth)" />
  
  <!-- Subtle Beveled Edge -->
  <rect x="6" y="6" width="228" height="324" rx="26" stroke="#E2E8F0" stroke-width="2" />
  
  <!-- Gloss Layer -->
  <rect x="4" y="4" width="232" height="328" rx="28" fill="url(#gloss_overlay)" />

  <!-- Integrated logo.svg -->
  <g transform="translate(60, 108) scale(3.75)">
    <!-- Brand Background (from logo.svg) -->
    <rect width="32" height="32" rx="10" fill="#10B981"/>
    
    <!-- Tile Icon (from logo.svg) -->
    <rect x="8.5" y="6.5" width="15" height="19" rx="3" stroke="white" stroke-width="2.5"/>
    <circle cx="12" cy="10" r="1.5" fill="white"/>
    <circle cx="20" cy="22" r="1.5" fill="white"/>
    
    <!-- Subtle Glass Highlight (from logo.svg) -->
    <rect x="2" y="2" width="28" height="14" rx="8" fill="white" fill-opacity="0.1"/>
  </g>

  <!-- Corner Decorative Accents -->
  <circle cx="40" cy="40" r="3" fill="#10B981" fill-opacity="0.2" />
  <circle cx="200" cy="40" r="3" fill="#10B981" fill-opacity="0.2" />
  <circle cx="40" cy="296" r="3" fill="#10B981" fill-opacity="0.2" />
  <circle cx="200" cy="296" r="3" fill="#10B981" fill-opacity="0.2" />
  
  <!-- Bottom Branding Text -->
  <text x="120" y="315" text-anchor="middle" font-family="Arial" font-size="8" font-weight="900" fill="#10B981" fill-opacity="0.4" letter-spacing="4">STRATEGIC TILE ENGINE</text>
</svg>
